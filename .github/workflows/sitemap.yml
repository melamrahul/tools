name: Update Sitemap

on:
  push:
    branches: [ main ]

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Find files
        run: find . -type f | sort

      - name: Update sitemap
        run: |
          DATE=$(date +%F)
          FILE=$(find . -iname "sitemap.xml" | head -n 1)
          echo "Using $FILE"
          sed -i "s|<lastmod>.*</lastmod>|<lastmod>$DATE</lastmod>|g" "$FILE"

      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add .
          git commit -m "Update sitemap" || exit 0
          git push
