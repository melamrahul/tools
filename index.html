<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Online Tools by Rahul</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #ffffff;
    --text: #000000;
    --border: #4468a9;
    --accent: #ff5e5b;
    --secondary: #f3f3f3;
    --border-width: 2px;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--border);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    padding-bottom:70px;
}

/* Container */
.container{
    max-width:640px;
    margin:20px auto;
    padding:15px;
}

/* Header */
.header{
    display:flex;
    align-items:center;
    gap:12px;
    border:var(--border-width) solid var(--border);
    padding:15px;
    margin-bottom:25px;
}

.logo img{
    width:40px;
    height:40px;
}

.header h2{
    font-size:1.1rem;
    font-weight:800;
}

.header p{
    font-size:0.75rem;
    font-weight:600;
}

/* Tool Cards */
.tool-card{
    border:var(--border-width) solid var(--border);
    margin-bottom:20px;
    background:white;
}

.tool-header{
    background:var(--border);
    color:white;
    padding:10px 15px;
    font-weight:800;
    font-size:0.85rem;
    text-transform:uppercase;
}

.tool-body{
    padding:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.tool-body h3{
    font-size:1rem;
    font-weight:800;
}

.tool-body p{
    font-size:0.8rem;
    opacity:0.7;
    margin-top:4px;
}

.open-btn{
    background:var(--secondary);
    color:var(--text);
    border:var(--border-width) solid var(--border);
    padding:10px 18px;
    font-weight:800;
    text-decoration:none;
    text-transform:uppercase;
    box-shadow:3px 3px 0px var(--border);
    transition:all 0.1s;
}

.open-btn:hover{
    transform:translate(-2px,-2px);
    box-shadow:5px 5px 0px var(--border);
}

/* Loader */
.global-loader{
    position:fixed;
    inset:0;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.global-spinner{
    width:80px;
    height:80px;
    border-radius:50%;
    border:6px solid var(--secondary);
    border-top:6px solid var(--border);
    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{transform:rotate(360deg);}
}

/* Footer */
footer{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    text-align:center;
    font-size:1rem;
    font-weight:600;
    color:#09759c;
    padding:10px 0;
    border-top:var(--border-width) solid var(--border);
    background:white;
}
</style>
</head>

<body>

<div class="global-loader" id="globalLoader">
    <div class="global-spinner"></div>
</div>

<div class="container" id="mainContent" style="display:none;">

    <div class="header">
        <div class="logo">
            <img src="https://melamrahul.github.io/tools/tool_logo_head.png" />
        </div>
        <div>
            <h2>Online Tools - By Rahul</h2>
            <p>Simple • Easy • Reliable</p>
        </div>
    </div>

    <!-- YT Converter -->
    <div class="tool-card">
        <div class="tool-header">Multimedia Tool</div>
        <div class="tool-body">
            <div>
                <h3>YT Converter</h3>
                <p>MP3 • MP4 • Download</p>
            </div>
            <a href="https://melamrahul.github.io/tools/yt_convert" class="open-btn">
                Open
            </a>
        </div>
    </div>

    <!-- Remove BG -->
    <div class="tool-card">
        <div class="tool-header">AI Tool</div>
        <div class="tool-body">
            <div>
                <h3>Remove Background</h3>
                <p>AI • Clean • Instant</p>
            </div>
            <a href="https://melamrahul.github.io/tools/remove_bg" class="open-btn">
                Open
            </a>
        </div>
    </div>

    <!-- QR Generator -->
    <div class="tool-card">
        <div class="tool-header">Utility Tool</div>
        <div class="tool-body">
            <div>
                <h3>QR Code Generator</h3>
                <p>Enter • Create • Download</p>
            </div>
            <a href="https://melamrahul.github.io/tools/qr_gen" class="open-btn">
                Open
            </a>
        </div>
    </div>

</div>

<footer>
    With ❤️ Built For Free • Free forever
</footer>

<script>
const loader = document.getElementById("globalLoader");
const content = document.getElementById("mainContent");

setTimeout(()=>{
    loader.style.display="none";
    content.style.display="block";
},1000);
</script>

</body>
</html>
