<style>
/* Contact Page Custom Responsive Styling */

body{
    margin:0;
    padding:0;
}

.contact-wrapper{
    width:100%;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.contact-box{
    width:100%;
    max-width:600px;
    background:#ffffff;
    border-radius:18px;
    padding:25px;
    box-shadow:0 10px 40px rgba(0,0,0,0.08);
}

.contact-title{
    font-size:32px;
    font-weight:700;
    text-align:center;
    margin-bottom:10px;
}

.contact-subtitle{
    text-align:center;
    margin-bottom:30px;
    opacity:0.75;
}

.form-group{
    margin-bottom:18px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    font-size:15px;
}

.form-control{
    width:100%;
    padding:14px 16px;
    border:1px solid #ddd;
    border-radius:12px;
    font-size:16px;
    outline:none;
    transition:0.2s;
}

.form-control:focus{
    border-color:#4f46e5;
}

textarea.form-control{
    min-height:100px;
    resize:vertical;
}

.btn-submit{
    width:100%;
    border:none;
    padding:15px;
    border-radius:12px;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    background:#111827;
    color:#fff;
    transition:0.3s;
}

.btn-submit:hover{
    opacity:0.9;
}

.alert{
    padding:14px;
    border-radius:10px;
    margin-bottom:20px;
    font-size:15px;
}

.alert-success{
    background:#ecfdf5;
    color:#065f46;
}

.alert-error{
    background:#fef2f2;
    color:#991b1b;
}

/* Mobile */
@media (max-width:768px){

    .contact-wrapper{
        padding:14px;
        align-items:flex-start;
        padding-top:30px;
    }

    .contact-box{
        padding:22px;
        border-radius:14px;
    }

    .contact-title{
        font-size:26px;
    }

    .form-control{
        font-size:15px;
        padding:13px;
    }

    .btn-submit{
        padding:14px;
    }
}

/* Large Desktop */
@media (min-width:1200px){
    .contact-box{
        max-width:760px;
        padding:45px;
    }

    .contact-title{
        font-size:36px;
    }
}
</style>
</head>
<body>

<div class="contact-wrapper">

    <div class="contact-box">

        <div class="contact-title">Contact Us - ruvs.in</div>
        <div class="contact-subtitle">
            We'd love to hear from you. Send us your message anytime.
        </div>

        <div id="response-msg"></div>

        <form id="contactForm">

            <input type="hidden" name="access_key" value="22c85f4d-14c7-42eb-8d6c-de43eda0ba43">

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control" required>
            </div>

            <div class="form-group">
                <label>Your Message</label>
                <textarea name="message" class="form-control" required></textarea>
            </div>

            <div class="form-group">
                <div class="h-captcha" data-captcha="true"></div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                Send Comment
            </button>

        </form>

    </div>

</div>

<script src="https://web3forms.com/client/script.js" async defer></script>

<script>
const form = document.getElementById("contactForm");
const msg = document.getElementById("response-msg");
const btn = document.getElementById("submitBtn");

form.addEventListener("submit", async function(e){
    e.preventDefault();

    // Disable button
    btn.disabled = true;
    btn.innerHTML = "Sending Comment...";
    btn.style.opacity = "0.7";
    btn.style.cursor = "not-allowed";

    msg.style.display = "none";

    const formData = new FormData(form);
    const json = Object.fromEntries(formData.entries());

    try {

        const response = await fetch("https://api.web3forms.com/submit", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Accept": "application/json"
            },
            body: JSON.stringify(json)
        });

        const data = await response.json();

        if(data.success){

            msg.className = "alert alert-success";
            msg.style.display = "block";
            msg.innerHTML = `
                <div style="font-size:40px;margin-bottom:10px;">✅</div>
                <strong>Thank You!</strong><br>
                We have received your comment successfully.
            `;

            form.reset();
            form.style.display = "none";

            if(window.hcaptcha){
                hcaptcha.reset();
            }

        } else {

            msg.className = "alert alert-error";
            msg.style.display = "block";
            msg.innerHTML = data.message || "Failed to send comment.";
        }

    } catch(error){

        msg.className = "alert alert-error";
        msg.style.display = "block";
        msg.innerHTML = "Something went wrong. Please try again.";

    }

    // Enable button again
    btn.disabled = false;
    btn.innerHTML = "Send Comment";
    btn.style.opacity = "1";
    btn.style.cursor = "pointer";

});
</script>

</body>
</html>
