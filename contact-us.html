    <style>
        .main-content {
            position: relative;
            max-width: 1200px;
            margin: 0 auto;
            height: 100vh;
            padding: 0;
            background-color: white;
        }

        .iframe-container {
            position: absolute;
            top: 0;
            left: 0;
            margin-top: 5rem;
            width: 100%;
            height: 100%;
            background-color: white;
            overflow: visible;
            z-index: 1;
        }

        iframe {
            position: absolute;
            inset: 0;
            background-color: white;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .mask-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 5rem;
            background: white;
            z-index: 10;
        }
    </style>

<body>
    <div class="global-loader" id="globalLoader" aria-hidden="true">
        <div class="spinner-ring">
            <img src="https://melamrahul.github.io/tools/tool_logo_head.png" alt="Loading" width="62" height="62">
        </div>
        <span class="loader-label">Loading…</span>
    </div>

    <div class="container" id="mainContent">
        <div class="header">
            <div class="logo-area">
                <img src="https://melamrahul.github.io/tools/tool_logo_head.png" alt="Eden Tools Logo" class="logo-img">

                    <h1>Contact Us</h1>

            <a href="https://melamrahul.github.io/tools/" class="tools-btn">All Tools</a>
        </div>

        <main class="main-content">
            <div class="iframe-container">
                <iframe src="https://minform.io/f/dp3lXVO" loading="lazy"></iframe>
                <div class="mask-bottom"></div> <!-- Hides bottom 5rem -->
            </div>
        </main>

        <footer style="background-color: white; z-index: 1100; position: fixed; bottom: 0; width: 100%; text-align: center;">With ❤️ Eden Tools • To save your time</footer>
    </div>

    <script>
        const globalLoader = document.getElementById('globalLoader');
        const mainContent = document.getElementById('mainContent');
        setTimeout(() => {
            globalLoader.classList.add('hidden');
            document.body.style.overflow = 'auto';
            mainContent.classList.add('visible');
        }, 0);
    </script>
</body>
